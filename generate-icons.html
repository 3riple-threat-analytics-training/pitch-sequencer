<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c512" width="512" height="512"></canvas>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c180" width="180" height="180"></canvas>
<br>
<button onclick="downloadAll()">Download All Icons</button>
<script>
function drawIcon(canvas){
  const ctx=canvas.getContext('2d');
  const s=canvas.width;
  const cx=s/2, cy=s/2;

  // Background
  ctx.fillStyle='#0a0e1a';
  ctx.fillRect(0,0,s,s);

  // Rounded background circle
  ctx.beginPath();
  ctx.arc(cx,cy,s*0.45,0,Math.PI*2);
  ctx.fillStyle='#0f2035';
  ctx.fill();
  ctx.strokeStyle='#7ec8e3';
  ctx.lineWidth=s*0.02;
  ctx.stroke();

  // Strike zone rectangle
  const zw=s*0.28, zh=s*0.36;
  const zx=cx-zw/2, zy=cy-zh/2;
  ctx.strokeStyle='#ffffff';
  ctx.lineWidth=s*0.025;
  ctx.strokeRect(zx,zy,zw,zh);

  // Zone grid lines
  ctx.strokeStyle='#4a7aaa';
  ctx.lineWidth=s*0.012;
  // Vertical dividers
  ctx.beginPath();
  ctx.moveTo(zx+zw/3,zy);ctx.lineTo(zx+zw/3,zy+zh);
  ctx.moveTo(zx+zw*2/3,zy);ctx.lineTo(zx+zw*2/3,zy+zh);
  // Horizontal dividers
  ctx.moveTo(zx,zy+zh/3);ctx.lineTo(zx+zw,zy+zh/3);
  ctx.moveTo(zx,zy+zh*2/3);ctx.lineTo(zx+zw,zy+zh*2/3);
  ctx.stroke();

  // Pitch arc — curved line suggesting a breaking ball
  ctx.beginPath();
  ctx.moveTo(s*0.15,s*0.25);
  ctx.bezierCurveTo(s*0.25,s*0.10,s*0.55,s*0.20,cx,cy-zh*0.1);
  ctx.strokeStyle='#ef4444';
  ctx.lineWidth=s*0.025;
  ctx.lineCap='round';
  ctx.stroke();

  // Second pitch arc — changeup dropping
  ctx.beginPath();
  ctx.moveTo(s*0.15,s*0.25);
  ctx.bezierCurveTo(s*0.30,s*0.28,s*0.50,s*0.45,cx,cy+zh*0.25);
  ctx.strokeStyle='#22c55e';
  ctx.lineWidth=s*0.020;
  ctx.stroke();

  // Gold corner dots
  const dotR=s*0.022;
  const corners=[
    [zx,zy],[zx+zw,zy],[zx,zy+zh],[zx+zw,zy+zh]
  ];
  ctx.fillStyle='#eab308';
  corners.forEach(([x,y])=>{
    ctx.beginPath();
    ctx.arc(x,y,dotR,0,Math.PI*2);
    ctx.fill();
  });
}

// Draw all icons
['c512','c192','c180'].forEach(id=>{
  drawIcon(document.getElementById(id));
});

function downloadIcon(canvasId,filename){
  const canvas=document.getElementById(canvasId);
  const a=document.createElement('a');
  a.download=filename;
  a.href=canvas.toDataURL('image/png');
  a.click();
}

function downloadAll(){
  downloadIcon('c512','icon-512.png');
  setTimeout(()=>downloadIcon('c192','icon-192.png'),500);
  setTimeout(()=>downloadIcon('c180','icon-180.png'),1000);
}
</script>
</body>
</html>
