<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Sequencer — Print</title>
<style>
@page {
  size: letter portrait;
  margin: 0.35in;
}
* {
  box-sizing: border-box;
}
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #fff;
  color: #111;
}
#controlbar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding: 12px;
  background: #e8e8e8;
  border-bottom: 1px solid #ccc;
}
#controlbar label {
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.5px;
}
#controlbar select {
  min-width: 220px;
  padding: 6px 8px;
  font-size: 12px;
}
#controlbar button#printbtn {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}
#pages {
  padding: 0;
}
.page {
  width: 8.5in;
  min-height: 11in;
  page-break-after: always;
  page-break-inside: avoid;
  padding: 0.4in;
  box-sizing: border-box;
  background: white;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}
.page:last-child {
  page-break-after: auto;
}
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1.5px solid #222;
  padding-bottom: 10px;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.page-header .title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.page-header .date {
  font-size: 11px;
  color: #333;
}
.page-pitcher-info{
  font-size:11px;
  color:#444;
  margin-top:3px;
  font-family:'DM Mono',monospace;
}
.slots {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
}
.slot {
  flex: 1;
  min-height: 4.6in;
  border: 1px solid #333;
  border-radius: 2px;
  background: #fff;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.slot.slot-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #888;
  font-size: 14px;
  font-weight: 600;
  border-color: #999;
}
.slot-header {
  padding: 8px 10px;
  border-bottom: 1px solid #ccc;
  font-size: 12px;
  line-height: 1.35;
  flex-shrink: 0;
}
.slot-header .plan-name {
  font-weight: 700;
  font-size: 13px;
}
.slot-header .meta {
  color: #444;
  margin-top: 2px;
}
.slot-arsenal{
  font-size:9px;
  color:#888;
  margin-top:2px;
  font-family:'DM Mono',monospace;
  letter-spacing:0.3px;
}
.slot-matchup{
  font-size:10px;
  color:#555;
  font-family:'DM Mono',monospace;
}
.slot-notes-label{
  font-size:7px;
  color:#888;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-top:4px;
  margin-bottom:1px;
  font-family:'DM Mono',monospace;
}
.slot-notes-text{
  font-size:8px;
  color:#444;
  font-family:'DM Mono',monospace;
  line-height:1.4;
  white-space:pre-wrap;
  word-wrap:break-word;
}
.slot-game-notes{
  border-top:0.5px solid #eee;
  padding-top:6px;
  margin-top:6px;
}
.slot-outcome{
  font-size:7px;
  padding:1px 4px;
  border-radius:3px;
  margin-left:4px;
  font-family:'DM Mono',monospace;
}
.slot-opponent{
  font-size:9px;
  color:#555;
  font-family:'DM Mono',monospace;
  margin-top:2px;
}
.slot-diagram {
  flex: 3;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 8px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}
.slot-diagram svg {
  max-width: 100%;
  height: auto;
  display: block;
}
.slot-table-wrap {
  flex: 1;
  min-height: 0;
  padding: 6px 8px 8px;
  overflow: auto;
  background: #fff;
}
.seq-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  color: #111;
}
.seq-table th,
.seq-table td {
  border: 1px solid #bbb;
  padding: 4px 6px;
  text-align: left;
  vertical-align: middle;
}
.seq-table th {
  background: #f5f5f5;
  font-weight: 700;
}
.seq-table td:nth-child(1),
.seq-table td:nth-child(3),
.seq-table td:nth-child(4),
.seq-table td:nth-child(5) {
  text-align: center;
}
.role-tag {
  font-weight: 700;
  font-size: 10px;
}
.role-SETUP { color: #2563eb; }
.role-TUNNEL { color: #b8860b; }
.role-CHASE { color: #ea580c; }
.role-PUTAWAY { color: #dc2626; }
.role-RESET { color: #6b7280; }
@media print {
  body { background: #fff; }
  #controlbar { display: none; }
  .slot { break-inside: avoid; }
}
</style>
</head>
<body>
<div id="controlbar">
  <label for="planfilter">FILTER PLANS</label>
  <select id="planfilter" aria-label="Filter plans to print"></select>
  <select id="oppfilterprint" onchange="filterByOpponent()">
    <option value="">ALL OPPONENTS</option>
  </select>
  <button type="button" id="printbtn">PRINT</button>
</div>
<div id="pages"></div>

<script>
(function () {
  'use strict';

  var PLAN_STORAGE_KEY = 'pitchSequencerSavedPlansV1';

  var PITCH_NAMES = {
    '4FB': '4-seam FB',
    '2FB': '2-seam FB',
    'CB': 'Curveball',
    'SL': 'Slider',
    'CH': 'Changeup',
    'CT': 'Cutter',
    'SP': 'Splitter'
  };

  var PITCH_COLORS = {
    '4FB': '#ef4444',
    '2FB': '#f97316',
    'CB': '#3b82f6',
    'SL': '#a855f7',
    'CH': '#22c55e',
    'CT': '#eab308',
    'SP': '#06b6d4'
  };

  var svgW = 700;
  var svgH = 480;

  function projectPoint(wx, wy, wz, w, h) {
    var dx = wx - 0;
    var dy = wy - 1.06;
    var dz = wz - (-1.2);
    if (dz <= 0.001) dz = 0.001;
    var focalLength = h / (2 * Math.tan(52 * Math.PI / 180 / 2));
    var projX = (-dx / dz) * focalLength + w / 2;
    var projY = (-dy / dz) * focalLength + h / 2;
    return { x: projX, y: projY };
  }

  function escHtml(v) {
    return String(v == null ? '' : v).replace(/[&<>"']/g, function (ch) {
      if (ch === '&') return '&amp;';
      if (ch === '<') return '&lt;';
      if (ch === '>') return '&gt;';
      if (ch === '"') return '&quot;';
      return '&#39;';
    });
  }

  function getSavedPlans() {
    try {
      var raw = localStorage.getItem(PLAN_STORAGE_KEY);
      var parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }

  function loadPitcherProfile(){
    try{
      var raw=localStorage.getItem('pitchseq-pitcher-profile');
      return raw?JSON.parse(raw):null;
    }catch(e){return null;}
  }

  function getSavedPlansForPrint() {
    return getSavedPlans();
  }

  function getBatterHand(plan){
    var raw=(plan && (plan.batterHand||plan.batter||plan.batterType))||'';
    var hand=String(raw).trim().toUpperCase();
    if(hand==='LHB'||hand==='RHB') return hand;
    return '';
  }

  var pitcherProfile = loadPitcherProfile();
  // DEBUG - log all saved plans to console
  const debugPlans=getSavedPlansForPrint();
  console.log('Saved plans:', JSON.stringify(debugPlans, null, 2));

  function fmtPt(p) {
    return p.x.toFixed(2) + ',' + p.y.toFixed(2);
  }

  function polylineFromProjected(pts) {
    if (!pts.length) return '';
    return pts.map(fmtPt).join(' ');
  }

  function buildStrikeZoneAndLabels() {
    var zPlate = 0.12;
    var corners = [
      projectPoint(-0.24, 1.37, zPlate, svgW, svgH),
      projectPoint(0.24, 1.37, zPlate, svgW, svgH),
      projectPoint(0.24, 0.75, zPlate, svgW, svgH),
      projectPoint(-0.24, 0.75, zPlate, svgW, svgH)
    ];
    var outline = corners.map(fmtPt).join(' ');

    var v1a = projectPoint(-0.08, 0.75, zPlate, svgW, svgH);
    var v1b = projectPoint(-0.08, 1.37, zPlate, svgW, svgH);
    var v2a = projectPoint(0.08, 0.75, zPlate, svgW, svgH);
    var v2b = projectPoint(0.08, 1.37, zPlate, svgW, svgH);

    var h1a = projectPoint(-0.24, 0.957, zPlate, svgW, svgH);
    var h1b = projectPoint(0.24, 0.957, zPlate, svgW, svgH);
    var h2a = projectPoint(-0.24, 1.163, zPlate, svgW, svgH);
    var h2b = projectPoint(0.24, 1.163, zPlate, svgW, svgH);

    var up = projectPoint(0, 1.50, zPlate, svgW, svgH);
    var low = projectPoint(0, 0.60, zPlate, svgW, svgH);
    var inn = projectPoint(-0.50, 1.06, zPlate, svgW, svgH);
    var out = projectPoint(0.50, 1.06, zPlate, svgW, svgH);

    var s = '';
    s += '<polygon points="' + outline + '" fill="none" stroke="#000" stroke-width="2" stroke-linejoin="round"/>';
    s += '<line x1="' + v1a.x.toFixed(2) + '" y1="' + v1a.y.toFixed(2) + '" x2="' + v1b.x.toFixed(2) + '" y2="' + v1b.y.toFixed(2) + '" stroke="#000" stroke-width="2"/>';
    s += '<line x1="' + v2a.x.toFixed(2) + '" y1="' + v2a.y.toFixed(2) + '" x2="' + v2b.x.toFixed(2) + '" y2="' + v2b.y.toFixed(2) + '" stroke="#000" stroke-width="2"/>';
    s += '<line x1="' + h1a.x.toFixed(2) + '" y1="' + h1a.y.toFixed(2) + '" x2="' + h1b.x.toFixed(2) + '" y2="' + h1b.y.toFixed(2) + '" stroke="#000" stroke-width="2"/>';
    s += '<line x1="' + h2a.x.toFixed(2) + '" y1="' + h2a.y.toFixed(2) + '" x2="' + h2b.x.toFixed(2) + '" y2="' + h2b.y.toFixed(2) + '" stroke="#000" stroke-width="2"/>';

    s += '<text x="' + up.x.toFixed(2) + '" y="' + (up.y - 8).toFixed(2) + '" text-anchor="middle" font-size="11" fill="#222" font-weight="600">UP</text>';
    s += '<text x="' + low.x.toFixed(2) + '" y="' + (low.y + 18).toFixed(2) + '" text-anchor="middle" font-size="11" fill="#222" font-weight="600">LOW</text>';
    s += '<text x="' + (inn.x - 14).toFixed(2) + '" y="' + (inn.y + 4).toFixed(2) + '" text-anchor="middle" font-size="11" fill="#222" font-weight="600">IN</text>';
    s += '<text x="' + (out.x + 14).toFixed(2) + '" y="' + (out.y + 4).toFixed(2) + '" text-anchor="middle" font-size="11" fill="#222" font-weight="600">OUT</text>';

    return s;
  }

  function projectPath(pts3d) {
    if (!Array.isArray(pts3d)) return [];
    return pts3d.map(function (p) {
      return projectPoint(Number(p.x), Number(p.y), Number(p.z), svgW, svgH);
    });
  }

  function tunnelOverlays(seq) {
    var parts = '';
    var nPitch = seq.length;
    for (var a = 0; a < nPitch; a++) {
      for (var b = a + 1; b < nPitch; b++) {
        var pa = projectPath(seq[a].pts3d || []);
        var pb = projectPath(seq[b].pts3d || []);
        var n = Math.min(pa.length, pb.length);
        if (n < 4) continue;
        var s0 = Math.floor(n * 0.15);
        var s1 = Math.floor(n * 0.72);
        for (var i = s0; i < s1; i++) {
          var d = Math.hypot(pa[i].x - pb[i].x, pa[i].y - pb[i].y);
          if (d < 15 && i + 1 < n) {
            var d2 = Math.hypot(pa[i + 1].x - pb[i + 1].x, pa[i + 1].y - pb[i + 1].y);
            if (d2 < 15) {
              var quad = fmtPt(pa[i]) + ' ' + fmtPt(pa[i + 1]) + ' ' + fmtPt(pb[i + 1]) + ' ' + fmtPt(pb[i]);
              parts += '<polygon points="' + quad + '" fill="rgba(234,179,8,0.28)" stroke="none"/>';
            }
          }
        }
      }
    }
    return parts;
  }

  function buildDiagramSvg(plan) {
    var seq = Array.isArray(plan.sequence) ? plan.sequence : [];
    var inner = '';

    inner += '<rect width="' + svgW + '" height="' + svgH + '" fill="#fff"/>';
    inner += buildStrikeZoneAndLabels();

    for (var p = 0; p < seq.length; p++) {
      var pitch = seq[p];
      var pts = Array.isArray(pitch.pts3d) ? pitch.pts3d : [];
      if (!pts.length) continue;
      var col = PITCH_COLORS[pitch.pk] || '#6b7280';
      var projectedPoints = pts.map(function (pt) {
        return projectPoint(Number(pt.x), Number(pt.y), Number(pt.z), svgW, svgH);
      });
      var pl = polylineFromProjected(projectedPoints);
      inner += '<polyline points="' + pl + '" fill="none" stroke="' + col + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>';
    }

    inner += tunnelOverlays(seq);

    for (var q = 0; q < seq.length; q++) {
      var pitch2 = seq[q];
      var pts2 = Array.isArray(pitch2.pts3d) ? pitch2.pts3d : [];
      if (!pts2.length) continue;
      var last = pts2[pts2.length - 1];
      var c = projectPoint(Number(last.x), Number(last.y), Number(last.z), svgW, svgH);
      var col2 = PITCH_COLORS[pitch2.pk] || '#6b7280';
      inner += '<circle cx="' + c.x.toFixed(2) + '" cy="' + c.y.toFixed(2) + '" r="10" fill="' + col2 + '"/>';
      inner += '<text x="' + c.x.toFixed(2) + '" y="' + (c.y + 4).toFixed(2) + '" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">' + (q + 1) + '</text>';
    }

    if (seq.length) {
      var first = Array.isArray(seq[0].pts3d) ? seq[0].pts3d : [];
      if (first.length) {
        var r0 = first[0];
        var rel = projectPoint(Number(r0.x), Number(r0.y), Number(r0.z), svgW, svgH);
        inner += '<circle cx="' + rel.x.toFixed(2) + '" cy="' + rel.y.toFixed(2) + '" r="4" fill="#9ca3af"/>';
        inner += '<text x="' + (rel.x + 8).toFixed(2) + '" y="' + (rel.y + 3).toFixed(2) + '" font-size="9" fill="#6b7280" font-weight="600">Release</text>';
      }
    }

    return '<svg xmlns="http://www.w3.org/2000/svg" width="' + svgW + '" height="' + svgH + '" viewBox="0 0 ' + svgW + ' ' + svgH + '" role="img" aria-label="Pitch diagram">' + inner + '</svg>';
  }

  function buildTable(plan) {
    var seq = Array.isArray(plan.sequence) ? plan.sequence : [];
    var rows = seq.map(function (s, i) {
      var pitchName = PITCH_NAMES[s.pk] || escHtml(s.pk || '');
      var role = s.role || '';
      return ''
        + '<tr>'
        + '<td>' + (i + 1) + '</td>'
        + '<td>' + escHtml(pitchName) + '</td>'
        + '<td>' + (Number.isFinite(s.spd) ? s.spd : '') + '</td>'
        + '<td>' + escHtml(s.zk || '') + '</td>'
        + '<td>' + escHtml(s.count || '') + '</td>'
        + '<td><span class="role-tag role-' + escHtml(role) + '">' + escHtml(role) + '</span></td>'
        + '</tr>';
    }).join('');
    return ''
      + '<table class="seq-table">'
      + '<thead><tr><th>#</th><th>Pitch</th><th>MPH</th><th>Zone</th><th>Count</th><th>Role</th></tr></thead>'
      + '<tbody>' + (rows || '<tr><td colspan="6" style="text-align:center;color:#666;">No pitches</td></tr>') + '</tbody>'
      + '</table>';
  }

  function slotHeaderHtml(plan) {
    var name = escHtml(plan.name || 'Unnamed Plan');
    var batterLabel=getBatterHand(plan);
    var pitcherHand=pitcherProfile?(pitcherProfile.hand==='R'?'RHP':(pitcherProfile.hand==='L'?'LHP':'')):'';
    var matchup=batterLabel&&pitcherHand?batterLabel+' vs '+pitcherHand:(pitcherHand||batterLabel||'');
    var outcomeColor=plan.outcome==='WORKED'?'#4ade80':
      plan.outcome==="DIDN\'T WORK"?'#f87171':
      plan.outcome==='NEEDS ADJUSTMENT'?'#eab308':'#6a8aaa';
    var outcomeLabel=escHtml(plan.outcome||'UNTESTED');
    var opponent=String(plan.opponent||'').trim();
    var batterNotes=String(plan.batterNotes||'').trim();
    var opponentLine=opponent
      ?'<div class="slot-opponent">vs '+escHtml(opponent)+' <span class="slot-outcome" style="color:'+outcomeColor+';border:0.5px solid '+outcomeColor+';">'+outcomeLabel+'</span></div>'
      :'<div><span class="slot-outcome" style="color:'+outcomeColor+';border:0.5px solid '+outcomeColor+';">'+outcomeLabel+'</span></div>';
    var batterNotesLine=batterNotes?'<div class="slot-notes-label">BATTER NOTES</div><div class="slot-notes-text">'+escHtml(batterNotes)+'</div>':'';
    return ''
      + '<div class="slot-header">'
      + '<div class="slot-title">' + name + '</div>'
      + '<div class="slot-matchup">' + escHtml(matchup) + '</div>'
      + opponentLine
      + batterNotesLine
      + '</div>';
  }

  function buildFilledSlot(plan) {
    var gameNotes=String(plan.gameNotes||'').trim();
    var gameNotesHtml=gameNotes?'<div class="slot-game-notes"><div class="slot-notes-label">GAME NOTES</div><div class="slot-notes-text">'+escHtml(gameNotes)+'</div></div>':'';
    return ''
      + '<section class="slot">'
      + slotHeaderHtml(plan)
      + '<div class="slot-diagram">' + buildDiagramSvg(plan) + '</div>'
      + '<div class="slot-table-wrap">' + buildTable(plan) + '</div>'
      + gameNotesHtml
      + '</section>';
  }

  function buildEmptySlot() {
    return '<section class="slot slot-empty">Empty slot</section>';
  }

  function getAgeGroupLabel(v){
    if(v==='youth') return 'Youth / Rec (12U and under)';
    if(v==='hs') return 'High School (14U–18U)';
    if(v==='college') return 'College / Minor League';
    if(v==='pro') return 'Professional';
    return '';
  }

  function buildPage(dateStr, planTop, planBottom) {
    var slotTop = planTop ? buildFilledSlot(planTop) : buildEmptySlot();
    var slotBottom = planBottom ? buildFilledSlot(planBottom) : buildEmptySlot();
    var headerInfo = '';
    if (pitcherProfile) {
      var nm = pitcherProfile.name ? escHtml(pitcherProfile.name) : '';
      var hand = pitcherProfile.hand === 'R' ? 'RHP' : (pitcherProfile.hand === 'L' ? 'LHP' : '');
      var age = getAgeGroupLabel(pitcherProfile.ageGroup);
      var parts = [];
      if (nm) parts.push(nm);
      if (hand) parts.push(hand);
      if (age) parts.push(age);
      if (parts.length) headerInfo = '<div class="page-pitcher-info">' + parts.join(' · ') + '</div>';
    }
    return ''
      + '<div class="page">'
      + '<div class="page-header">'
      + '<div><div class="title">PITCH SEQUENCER — ATTACK PLANS</div>' + headerInfo + '</div>'
      + '<div class="date">' + escHtml(dateStr) + '</div>'
      + '</div>'
      + '<div class="slots">' + slotTop + slotBottom + '</div>'
      + '</div>';
  }

  function populatePlanFilter(plans) {
    var sel = document.getElementById('planfilter');
    var prev = sel.value;
    sel.innerHTML = '';
    var optAll = document.createElement('option');
    optAll.value = '';
    optAll.textContent = 'ALL PLANS';
    sel.appendChild(optAll);
    plans.forEach(function (p, idx) {
      var o = document.createElement('option');
      o.value = p.id || '';
      o.textContent = p.name || ('Plan ' + (idx + 1));
      sel.appendChild(o);
    });
    var hasPrev = false;
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === prev) { hasPrev = true; break; }
    }
    sel.value = hasPrev ? prev : '';
  }

  function populateOpponentFilter(plans){
    var sel=document.getElementById('oppfilterprint');
    if(!sel)return;
    var prev=sel.value;
    sel.innerHTML='<option value="">ALL OPPONENTS</option>';
    var seen={};
    plans.forEach(function(p){
      var opp=(p&&p.opponent)?String(p.opponent).trim():'';
      if(!opp||seen[opp]) return;
      seen[opp]=true;
    });
    Object.keys(seen).sort().forEach(function(o){
      var opt=document.createElement('option');
      opt.value=o;
      opt.textContent=o;
      sel.appendChild(opt);
    });
    sel.value=seen[prev]?prev:'';
  }

  function render() {
    var plans = getSavedPlans();
    populateOpponentFilter(plans);
    var oppFilter=document.getElementById('oppfilterprint').value;
    var visiblePlans=oppFilter?plans.filter(function(p){return (p.opponent||'')===oppFilter;}):plans;
    populatePlanFilter(visiblePlans);
    var filterId = document.getElementById('planfilter').value;
    var dateStr = 'Generated: ' + new Date().toLocaleDateString(undefined, {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
    var html = '';
    if (filterId) {
      var one = null;
      for (var j = 0; j < visiblePlans.length; j++) {
        if (visiblePlans[j].id === filterId) { one = visiblePlans[j]; break; }
      }
      html += buildPage(dateStr, one, null);
    } else {
      var nPages = Math.max(1, Math.ceil(visiblePlans.length / 2));
      for (var pi = 0; pi < nPages; pi++) {
        var a = visiblePlans[pi * 2] || null;
        var b = visiblePlans[pi * 2 + 1] || null;
        html += buildPage(dateStr, a, b);
      }
    }
    document.getElementById('pages').innerHTML = html;
  }

  window.filterByOpponent=function(){
    render();
  };

  window.addEventListener('load', function () {
    render();
    document.getElementById('planfilter').addEventListener('change', function () {
      render();
    });
    document.getElementById('oppfilterprint').addEventListener('change', function () {
      render();
    });
    document.getElementById('printbtn').addEventListener('click', function () {
      window.print();
    });
  });
})();
</script>
