<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Sequencer Print</title>
<style>
@page{size:letter portrait;margin:0.35in;}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#fff;
  color:#111;
}
.page{
  width:100%;
  padding:0;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  border-bottom:1.2px solid #222;
  padding-bottom:8px;
  margin-bottom:10px;
}
.title{
  font-size:18px;
  letter-spacing:1.1px;
  font-weight:700;
}
.date{
  font-size:11px;
  color:#333;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(3,minmax(0,1fr));
  gap:10px;
}
.slot{
  border:1px solid #c8ced6;
  border-radius:4px;
  min-height:226px;
  background:#fff;
  padding:8px;
  display:flex;
  flex-direction:column;
}
.slot-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  border-bottom:1px solid #e3e7eb;
  margin-bottom:6px;
  padding-bottom:5px;
}
.plan-name{
  font-size:12px;
  font-weight:700;
  line-height:1.2;
}
.plan-hand{
  font-size:10px;
  border:1px solid #777;
  border-radius:999px;
  padding:2px 7px;
}
.slot-body{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:7px;
  align-items:start;
}
.zone-wrap{
  border:1px solid #e5e7eb;
  border-radius:4px;
  padding:2px;
}
.table-wrap{overflow:hidden;}
.seq-table{
  width:100%;
  border-collapse:collapse;
  font-size:9px;
}
.seq-table th,.seq-table td{
  border:1px solid #d8dde3;
  padding:2px 3px;
  text-align:left;
  vertical-align:middle;
}
.seq-table th{
  background:#f8f9fb;
  font-weight:700;
}
.seq-table td:nth-child(1),
.seq-table td:nth-child(3),
.seq-table td:nth-child(4),
.seq-table td:nth-child(5){
  text-align:center;
}
.role-tag{
  font-size:8px;
  font-weight:700;
  letter-spacing:0.2px;
}
.role-SETUP{color:#3b82f6;}
.role-TUNNEL{color:#b8860b;}
.role-CHASE{color:#f97316;}
.role-PUTAWAY{color:#ef4444;}
.role-RESET{color:#6b7280;}
.empty-slot{
  display:flex;
  align-items:center;
  justify-content:center;
  color:#9ca3af;
  font-size:16px;
  font-weight:600;
  border:1px solid #d1d5db;
}
.empty-table{
  color:#6b7280;
  text-align:center;
  font-style:italic;
}
@media print{
  .slot{break-inside:avoid;}
}
</style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="title">PITCH SEQUENCER &mdash; ATTACK PLANS</div>
      <div class="date" id="gendate"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

<script>
const PLAN_STORAGE_KEY='pitchSequencerSavedPlansV1';
const PITCHES={
  '4FB':{name:'4-seam FB',color:'#ef4444'},
  '2FB':{name:'2-seam FB',color:'#f97316'},
  'CB':{name:'Curveball',color:'#3b82f6'},
  'SL':{name:'Slider',color:'#a855f7'},
  'CH':{name:'Changeup',color:'#22c55e'},
  'CT':{name:'Cutter',color:'#eab308'},
  'SP':{name:'Splitter',color:'#06b6d4'}
};

function escHtml(v){
  return String(v==null?'':v).replace(/[&<>"']/g,function(ch){
    if(ch==='&') return '&amp;';
    if(ch==='<') return '&lt;';
    if(ch==='>') return '&gt;';
    if(ch==='"') return '&quot;';
    return '&#39;';
  });
}

function getSavedPlans(){
  try{
    const raw=localStorage.getItem(PLAN_STORAGE_KEY);
    const parsed=raw?JSON.parse(raw):[];
    return Array.isArray(parsed)?parsed:[];
  }catch(e){
    return [];
  }
}

function mapPointToSvg(x,y){
  const svgXMin=44,svgXMax=236;
  const strikeTop=58,strikeBottom=138;
  const zoneYHigh=1.37,zoneYLow=0.75;
  const ySpan=(strikeBottom-strikeTop)/(zoneYHigh-zoneYLow);
  const svgYMin=16,svgYMax=184;
  const px=svgXMin+(((-x)+0.50)/1.0)*(svgXMax-svgXMin);
  const py=strikeBottom-((y-zoneYLow)*ySpan);
  return {
    x:Math.max(10,Math.min(270,px)),
    y:Math.max(svgYMin,Math.min(svgYMax,py))
  };
}

function svgPathFromPitchPoints(pts){
  if(!Array.isArray(pts)||!pts.length) return '';
  const p0=mapPointToSvg(pts[0].x,pts[0].y);
  if(pts.length===1) return 'M '+p0.x.toFixed(1)+' '+p0.y.toFixed(1);
  const p1i=Math.floor((pts.length-1)/3);
  const p2i=Math.floor((pts.length-1)*2/3);
  const p1=mapPointToSvg(pts[p1i].x,pts[p1i].y);
  const p2=mapPointToSvg(pts[p2i].x,pts[p2i].y);
  const pe=mapPointToSvg(pts[pts.length-1].x,pts[pts.length-1].y);
  return 'M '+p0.x.toFixed(1)+' '+p0.y.toFixed(1)+' C '+p1.x.toFixed(1)+' '+p1.y.toFixed(1)+', '+p2.x.toFixed(1)+' '+p2.y.toFixed(1)+', '+pe.x.toFixed(1)+' '+pe.y.toFixed(1);
}

function buildZoneSvg(plan){
  const seqItems=Array.isArray(plan.sequence)?plan.sequence:[];
  const paths=seqItems.map(function(s,i){
    const p=PITCHES[s.pk];
    if(!p) return '';
    const d=svgPathFromPitchPoints(s.pts3d||[]);
    if(!d) return '';
    const end=(s.pts3d&&s.pts3d.length)?s.pts3d[s.pts3d.length-1]:null;
    const pt=end?mapPointToSvg(end.x,end.y):{x:140,y:70};
    return ''
      +'<path d="'+d+'" fill="none" stroke="'+p.color+'" stroke-width="2" stroke-linecap="round" opacity="0.95"></path>'
      +'<circle cx="'+pt.x.toFixed(1)+'" cy="'+pt.y.toFixed(1)+'" r="8.5" fill="'+p.color+'" stroke="#000" stroke-width="0.8"></circle>'
      +'<text x="'+pt.x.toFixed(1)+'" y="'+(pt.y+3).toFixed(1)+'" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">'+(i+1)+'</text>';
  }).join('');

  return ''
    +'<svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pitch zone diagram">'
    +'<rect x="0" y="0" width="280" height="200" fill="#fff"></rect>'
    +'<rect x="84" y="58" width="112" height="80" fill="none" stroke="#111" stroke-width="1.5"></rect>'
    +'<line x1="121.3" y1="58" x2="121.3" y2="138" stroke="#111" stroke-width="1"></line>'
    +'<line x1="158.7" y1="58" x2="158.7" y2="138" stroke="#111" stroke-width="1"></line>'
    +'<line x1="84" y1="84.7" x2="196" y2="84.7" stroke="#111" stroke-width="1"></line>'
    +'<line x1="84" y1="111.3" x2="196" y2="111.3" stroke="#111" stroke-width="1"></line>'
    +'<rect x="102" y="24" width="76" height="20" fill="#fff" stroke="#666" stroke-width="0.8"></rect>'
    +'<text x="140" y="37" text-anchor="middle" font-size="8.5" fill="#222">UP</text>'
    +'<rect x="102" y="154" width="76" height="20" fill="#fff" stroke="#666" stroke-width="0.8"></rect>'
    +'<text x="140" y="167" text-anchor="middle" font-size="8.5" fill="#222">LOW</text>'
    +'<rect x="50" y="88" width="28" height="22" fill="#fff" stroke="#666" stroke-width="0.8"></rect>'
    +'<text x="64" y="102" text-anchor="middle" font-size="8.5" fill="#222">IN</text>'
    +'<rect x="202" y="88" width="28" height="22" fill="#fff" stroke="#666" stroke-width="0.8"></rect>'
    +'<text x="216" y="102" text-anchor="middle" font-size="8.5" fill="#222">OUT</text>'
    +paths
    +'</svg>';
}

function buildTable(plan){
  const seqItems=Array.isArray(plan.sequence)?plan.sequence:[];
  const rows=seqItems.map(function(s,i){
    const pitchName=PITCHES[s.pk]?PITCHES[s.pk].name:(s.pk||'');
    const role=s.role||'';
    return ''
      +'<tr>'
      +'<td>'+(i+1)+'</td>'
      +'<td>'+escHtml(pitchName)+'</td>'
      +'<td>'+(Number.isFinite(s.spd)?s.spd:'')+'</td>'
      +'<td>'+escHtml(s.zk||'')+'</td>'
      +'<td>'+escHtml(s.count||'')+'</td>'
      +'<td><span class="role-tag role-'+escHtml(role)+'">'+escHtml(role)+'</span></td>'
      +'</tr>';
  }).join('');
  return ''
    +'<table class="seq-table">'
    +'<thead><tr><th>#</th><th>Pitch</th><th>MPH</th><th>Zone</th><th>Count</th><th>Role</th></tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="6" class="empty-table">No pitches saved</td></tr>')+'</tbody>'
    +'</table>';
}

function buildSlot(plan){
  if(!plan){
    return '<section class="slot empty-slot"><div>Empty slot</div></section>';
  }
  const hand=(plan.batter==='LHB'||plan.batter==='RHB')?plan.batter:'N/A';
  return ''
    +'<section class="slot">'
    +'<div class="slot-head">'
    +'<div class="plan-name">'+escHtml(plan.name||'Untitled plan')+'</div>'
    +'<div class="plan-hand">'+escHtml(hand)+'</div>'
    +'</div>'
    +'<div class="slot-body">'
    +'<div class="zone-wrap">'+buildZoneSvg(plan)+'</div>'
    +'<div class="table-wrap">'+buildTable(plan)+'</div>'
    +'</div>'
    +'</section>';
}

function render(){
  const plans=getSavedPlans().slice(-6);
  const grid=document.getElementById('grid');
  const slots=[];
  for(let i=0;i<6;i++) slots.push(buildSlot(plans[i]||null));
  grid.innerHTML=slots.join('');
  document.getElementById('gendate').textContent='Generated: '+new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});
}

window.addEventListener('load',function(){
  render();
  setTimeout(function(){window.print();},220);
});
</script>
</body>
</html>
